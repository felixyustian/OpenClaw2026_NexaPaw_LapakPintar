[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.railway"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "api"

[services.variables]
PORT = "8000"
DEMO_MODE = "true"
REDIS_HOST = "redis.railway.internal"
REDIS_PORT = "6379"
